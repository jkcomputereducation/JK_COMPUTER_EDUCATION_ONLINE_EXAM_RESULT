    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 650px; margin: 20px auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); border-top: 10px solid #1a237e; }
        .header { text-align: center; border-bottom: 3px solid #1a237e; padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #1a237e; font-size: 24px; text-transform: uppercase; font-weight: 800; }
        .header p { margin: 5px 0; font-weight: bold; color: #333; font-size: 14px; }
        .associated { color: #d32f2f; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-top: 5px; }
        .search-area { text-align: center; background: #e8eaf6; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #1a237e; }
        input { padding: 12px; width: 60%; border: 2px solid #1a237e; border-radius: 5px; font-size: 18px; text-align: center; }
        button { padding: 12px; background: #1a237e; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; width: 100%; }
        #marksheet { display: none; border: 2px solid #000; padding: 20px; background: #fff; position: relative; }
        .st-info { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; font-size: 13px; line-height: 1.6; text-align: left; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; }
        th { background: #f2f2f2; }
        .result-footer { margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .verified { border: 2px solid green; color: green; padding: 5px 15px; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>JK COMPUTER EDUCATION</h1>
        <p>NANDAUR, SANT KABIR NAGAR (UP)</p>

    <div class="search-area">

    <div id="marksheet">
        <h3 style="text-align:center; text-decoration: underline; margin-top: 0;">STATEMENT OF MARKS</h3>

            <div class="verified">✓ VERIFIED</div>

    const subNames = ["Fundamentals", "MS Word", "MS Excel", "MS PowerPoint", "Tally", "Internet", "Practical"];

    function checkResult() {
        let input = document.getElementById("rollNo").value.trim();
        const sheet = document.getElementById("marksheet");
        if (students[input]) {
            const s = students[input];
            sheet.style.display = "block";
            document.getElementById("studentDetails").innerHTML = `<div><strong>Student:</strong> ${s.name}<br><strong>Father:</strong> ${s.father}</div><div style="text-align:right"><strong>Roll:</strong> ${s.roll}</div>`;
            let rows = "";
            s.marks.forEach((m, i) => { rows += `<tr><td>${i+1}</td><td>${subNames[i]}</td><td>100</td><td>${m}</td></tr>`; });
            document.getElementById("marksBody").innerHTML = rows;
            document.getElementById("total").innerText = s.total;
            document.getElementById("grade").innerText = s.grade;
        } else { alert("Error: Is number ka record nahi mila (0001-0035 enter karein)"); sheet.style.display = "none"; }
